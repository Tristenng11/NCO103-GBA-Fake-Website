<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Advisor Portal | Nexus Heritage</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #1A2B3C;
            --accent: #C5A059;
            --error: #DC2626;
            --success: #16A34A;
            --bg: #F8FAFC;
        }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; color: var(--primary);
        }

        .login-card {
            background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%; max-width: 400px; text-align: center;
        }

        .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; gap: 10px; }

        h2 { font-family: 'Playfair Display', serif; margin-bottom: 10px; }
        p.subtitle { color: #64748B; font-size: 0.9rem; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; color: #475569; }
        input { width: 100%; padding: 12px; border: 1px solid #CBD5E1; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }

        .btn-login { 
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 14px; border-radius: 6px; font-weight: 600; cursor: pointer; 
            transition: all 0.3s; margin-top: 10px;
        }
        .btn-login:hover { background: #263d54; }

        /* Feedback States */
        #feedback { margin-top: 20px; padding: 12px; border-radius: 6px; display: none; font-size: 0.9rem; font-weight: 500; }
        .fail { background: #FEE2E2; color: var(--error); border: 1px solid #FCA5A5; }
        .success { background: #DCFCE7; color: var(--success); border: 1px solid #86EFAC; }

        .back-home { margin-top: 25px; display: block; color: #94A3B8; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">
            <i data-lucide="landmark" color="#1A2B3C"></i>
            NEXUS HERITAGE
        </div>
        <h2>Advisor Portal</h2>
        <p class="subtitle">Please enter your institutional credentials.</p>

        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="text" id="username" placeholder="name@company.com" required>
            </div>
            <div class="input-group">
                <label>Security Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Authorize Session</button>
        </form>

        <div id="feedback"></div>

        <a href="index.html" class="back-home">← Return to Public Site</a>
    </div>

    <script>
        lucide.createIcons();

        const loginForm = document.getElementById('loginForm');
        const feedback = document.getElementById('feedback');
        const btn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // UI Visual Feedback (Loading state)
            btn.innerText = "Authenticating...";
            btn.style.opacity = "0.7";
            btn.disabled = true;

            // Simulate server delay
            setTimeout(() => {
                const user = document.getElementById('username').value;
                const pass = document.getElementById('password').value;

                feedback.style.display = "block";
                
                // Demo logic: Success if user is "admin" and pass is "nexus2026"
                if(user === "admin" && pass === "nexus2026") {
                    feedback.className = "success";
                    feedback.innerHTML = '<i data-lucide="check-circle" size="16"></i> Access Granted. Redirecting to vault...';
                    lucide.createIcons();
                    
                    // In a real site, you'd redirect here:
                    // window.location.href = "dashboard.html";
                } else {
                    feedback.className = "fail";
                    feedback.innerHTML = '<i data-lucide="alert-circle" size="16"></i> Authentication Failed. Invalid ID or Password.';
                    lucide.createIcons();
                    
                    // Reset button
                    btn.innerText = "Authorize Session";
                    btn.style.opacity = "1";
                    btn.disabled = false;
                }
            }, 1500); // 1.5 second "fake" loading time
        });
    </script>
</body>
</html>
